<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiFi Analyzer</title>
  <style>
    body { font-family: system-ui, sans-serif; background:#121212; color:#fff; padding:20px; max-width:740px; margin:0 auto; }
    .card { background:#1e1e1e; border-radius:14px; padding:20px; margin-bottom:20px; }
    button { background:#4fc3f7; color:#121212; border:none; padding:12px 20px; font-size:15px; font-weight:600; border-radius:10px; cursor:pointer; }
    button.secondary { background:#333; color:#ccc; }
    .survey-result { background:#252525; padding:12px; border-radius:8px; margin-top:12px; font-size:13px; }
  </style>
</head>
<body>
  <h1 style="color:#4fc3f7">WiFi Analyzer</h1>
  <p style="color:#888">Refined Analysis + Phase 4 Features</p>

  <div class="card">
    <button id="scanBtn" style="width:100%; padding:16px; font-size:17px;">Scan WiFi Now</button>
    <div id="resultArea" style="margin-top:20px;"></div>

    <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
      <button id="exportBtn" class="secondary">Export Detailed Report</button>
      <button id="surveyBtn" class="secondary">Start Survey Mode</button>
    </div>
    <div id="surveyResults" style="margin-top:12px;"></div>
  </div>

  <div class="card">
    <div style="font-weight:600; margin-bottom:10px; color:#888;">Recent Scan History</div>
    <div id="historyArea"></div>
  </div>

  <script type="module">
    import { analyzeScan } from './js/wifi-analyzer.js';
    import { saveScan, getScanHistory } from './js/wifi-storage.js';
    import { renderScanResult, renderHistory, exportScanReport, startSurveyMode, stopSurveyMode, getSurveySamples } from './js/ui-wifi.js';

    let currentScan = null;
    let currentAnalysis = null;
    let surveyInterval = null;

    const resultArea = document.getElementById('resultArea');
    const historyArea = document.getElementById('historyArea');
    const surveyResults = document.getElementById('surveyResults');
    const scanBtn = document.getElementById('scanBtn');
    const exportBtn = document.getElementById('exportBtn');
    const surveyBtn = document.getElementById('surveyBtn');

    function refreshHistory() {
      renderHistory(historyArea, getScanHistory());
    }

    function doScan() {
      const mock = {
        timestamp: Date.now(),
        currentNetwork: {
          ssid: "DemoNet-5G",
          bssid: "AA:BB:CC:12:34:56",
          signalStrength: -58,
          frequency: 5745,
          channel: 149,
          band: "5",
          channelWidth: 80,
          security: "WPA3",
          isConnected: true
        },
        nearbyNetworks: Array.from({length: 9}, (_, i) => ({
          ssid: `Neighbor${i}`,
          signalStrength: -45 - (i*4),
          frequency: 5745,
          channel: 149,
          band: "5",
          channelWidth: 20,
          security: "WPA2"
        }))
      };

      currentAnalysis = analyzeScan(mock);
      currentScan = mock;

      renderScanResult(resultArea, mock, currentAnalysis);
      saveScan(mock, currentAnalysis);
      refreshHistory();
    }

    scanBtn.addEventListener('click', doScan);

    exportBtn.addEventListener('click', () => {
      if (currentScan && currentAnalysis) {
        exportScanReport(currentScan, currentAnalysis);
      } else {
        alert('Run a scan first to export a report.');
      }
    });

    surveyBtn.addEventListener('click', () => {
      if (surveyInterval) {
        const samples = stopSurveyMode(surveyInterval);
        surveyInterval = null;
        surveyBtn.textContent = 'Start Survey Mode';
        surveyBtn.style.background = '#333';

        // Show summary of recorded samples
        const avgSignal = samples.length > 0 
          ? Math.round(samples.reduce((sum, s) => sum + s.signalStrength, 0) / samples.length) 
          : 'N/A';

        surveyResults.innerHTML = `
          <div class="survey-result">
            <strong>Survey Complete</strong><br>
            Samples recorded: <strong>${samples.length}</strong><br>
            Average signal: <strong>${avgSignal} dBm</strong><br>
            <small style="color:#888;">Data ready for export or further analysis.</small>
          </div>
        `;
      } else {
        surveyResults.innerHTML = '';
        surveyBtn.textContent = 'Stop Survey Mode';
        surveyBtn.style.background = '#c62828';
        surveyInterval = startSurveyMode((sample) => {
          // Live update (optional)
        });
      }
    });

    refreshHistory();
    resultArea.innerHTML = '<div style="color:#666; padding:8px 0;">Click the button above to run an analysis.</div>';
  </script>
</body>
</html>
