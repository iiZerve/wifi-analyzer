<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiFi Analyzer</title>
  <style>
    body { font-family: system-ui, sans-serif; background:#0f0f0f; color:#fff; padding:16px; max-width:720px; margin:0 auto; }
    h1 { color:#4fc3f7; }
    .card { background:#1a1a1a; border-radius:16px; padding:20px; margin-bottom:20px; }
    button { background:#4fc3f7; color:#0f0f0f; border:none; padding:14px 24px; font-size:16px; font-weight:700; border-radius:12px; cursor:pointer; width:100%; }
    button.secondary { background:#333; color:#ccc; font-weight:600; }
    .section-title { font-size:13px; color:#888; margin-bottom:10px; text-transform:uppercase; letter-spacing:0.5px; }
  </style>
</head>
<body>
  <h1>WiFi Analyzer</h1>
  <p style="color:#888; margin-bottom:24px;">Real WiFi Analysis • No Mock Data</p>

  <div class="card">
    <button id="scanBtn">Scan Real WiFi Environment</button>
    <div id="resultArea" style="margin-top:24px;"></div>
  </div>

  <div class="card">
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button id="exportBtn" class="secondary" style="flex:1;">Export Report</button>
      <button id="surveyBtn" class="secondary" style="flex:1;">Start Path Survey</button>
    </div>
    <div id="surveyResults" style="margin-top:12px;"></div>
  </div>

  <div class="card">
    <div class="section-title">Recent Real Scans</div>
    <div id="historyArea"></div>
  </div>

  <script type="module">
    import { analyzeScan } from './js/wifi-analyzer.js';
    import { saveScan, getScanHistory } from './js/wifi-storage.js';
    import { renderScanResult, renderHistory, exportScanReport, startSurveyMode, stopSurveyMode } from './js/ui-wifi.js';
    import { scanWifi } from './js/wifi-scanner.js';

    let currentScan = null;
    let currentAnalysis = null;
    let surveyInterval = null;

    const resultArea = document.getElementById('resultArea');
    const historyArea = document.getElementById('historyArea');
    const surveyResults = document.getElementById('surveyResults');
    const scanBtn = document.getElementById('scanBtn');
    const exportBtn = document.getElementById('exportBtn');
    const surveyBtn = document.getElementById('surveyBtn');

    function refreshHistory() {
      renderHistory(historyArea, getScanHistory());
    }

    async function doRealScan() {
      scanBtn.disabled = true;
      scanBtn.textContent = 'Scanning real environment...';

      try {
        // Only use real native scanning - no mock fallback in production flow
        const scanResult = await scanWifi();

        currentAnalysis = analyzeScan(scanResult);
        currentScan = scanResult;

        renderScanResult(resultArea, scanResult, currentAnalysis);
        saveScan(scanResult, currentAnalysis);
        refreshHistory();

      } catch (err) {
        resultArea.innerHTML = `
          <div style="background:#2a1515; color:#ff8a80; padding:16px; border-radius:12px;">
            <strong>Real scan failed</strong><br>
            ${err.message}<br><br>
            <small>Make sure you are running the Android app and have granted Location permission.</small>
          </div>`;
      } finally {
        scanBtn.disabled = false;
        scanBtn.textContent = 'Scan Real WiFi Environment';
      }
    }

    scanBtn.addEventListener('click', doRealScan);

    exportBtn.addEventListener('click', () => {
      if (currentScan && currentAnalysis) {
        exportScanReport(currentScan, currentAnalysis);
      } else {
        alert('Run a real scan first');
      }
    });

    surveyBtn.addEventListener('click', () => {
      alert('Path Survey mode is under development. It will use real repeated scans while you walk.');
      // Future: Will use real repeated scanWifi() calls + motion sensors
    });

    refreshHistory();
    resultArea.innerHTML = '<div style="text-align:center; color:#666; padding:30px 10px;">Tap the button to perform a real WiFi scan using your device.</div>';
  </script>
</body>
</html>
