<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiFi Analyzer</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #121212; color: #fff; padding: 20px; max-width: 720px; margin: 0 auto; }
    h1 { color: #4fc3f7; }
    .card { background: #1e1e1e; border-radius: 14px; padding: 20px; margin-bottom: 20px; }
    button { background: #4fc3f7; color: #121212; border: none; padding: 14px 24px; font-size: 15px; font-weight: 600; border-radius: 10px; cursor: pointer; }
    button:hover { background: #29b6f6; }
    .health-score { font-size: 64px; font-weight: 800; color: #4fc3f7; line-height: 1; }
    .issue-pill { background: #3a2a00; color: #ffcc80; padding: 6px 14px; border-radius: 999px; font-size: 13px; display: inline-block; margin: 4px 6px 4px 0; }
    .feedback-item { background: #252525; padding: 14px 16px; border-radius: 10px; margin-bottom: 10px; line-height: 1.5; }
    .history-item { background: #1e1e1e; padding: 12px 16px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; }
  </style>
</head>
<body>
  <h1>WiFi Analyzer</h1>
  <p style="color:#888; margin-bottom:24px;">Phases 2-4 Demo • Rich UI + History</p>

  <div class="card">
    <button id="scanBtn" style="width:100%; padding:16px; font-size:17px;">Scan WiFi Environment</button>
    <div id="mainResult" style="margin-top:24px;"></div>
  </div>

  <div class="card">
    <div style="font-weight:600; margin-bottom:12px; color:#888;">Recent Scans (History)</div>
    <div id="historyContainer"></div>
    <button id="clearHistoryBtn" style="margin-top:12px; background:#333; color:#aaa; font-size:13px; padding:8px 16px;">Clear History</button>
  </div>

  <script type="module">
    import { analyzeScan } from './js/wifi-analyzer.js';
    import { saveScan, getScanHistory, clearHistory } from './js/wifi-storage.js';
    import { renderScanResult, renderHistory } from './js/ui-wifi.js';

    const mainResult = document.getElementById('mainResult');
    const historyContainer = document.getElementById('historyContainer');
    const scanBtn = document.getElementById('scanBtn');
    const clearBtn = document.getElementById('clearHistoryBtn');

    function updateHistory() {
      const history = getScanHistory();
      renderHistory(historyContainer, history);
    }

    function runNewScan() {
      scanBtn.disabled = true;
      scanBtn.textContent = 'Scanning...';

      // Simulate different realistic scenarios
      const scenarios = [
        { name: 'Good 5GHz', signal: -48, band: '5', channel: 36, congestion: 1 },
        { name: 'Weak + Congested 2.4', signal: -78, band: '2.4', channel: 6, congestion: 5 },
        { name: 'Open Network', signal: -55, band: '2.4', channel: 1, open: true }
      ];
      const scenario = scenarios[Math.floor(Math.random() * scenarios.length)];

      // Build realistic mock result
      const mockResult = {
        timestamp: Date.now(),
        currentNetwork: {
          ssid: scenario.name,
          bssid: 'AA:BB:CC:00:11:22',
          signalStrength: scenario.signal,
          frequency: scenario.band === '5' ? 5180 : 2437,
          channel: scenario.channel,
          band: scenario.band,
          channelWidth: scenario.band === '5' ? 80 : 20,
          security: scenario.open ? 'Open' : 'WPA3',
          isConnected: true
        },
        nearbyNetworks: Array.from({length: scenario.congestion + 3}, (_, i) => ({
          ssid: `Neighbor-${i}`,
          bssid: `AA:BB:CC:00:00:${i}`,
          signalStrength: -50 - (i * 4),
          frequency: scenario.band === '5' ? 5180 : 2437,
          channel: scenario.channel,
          band: scenario.band,
          channelWidth: 20,
          security: 'WPA2',
          isConnected: false
        }))
      };

      const analysis = analyzeScan(mockResult);

      // Render beautiful result
      renderScanResult(mainResult, mockResult, analysis);

      // Save to history
      saveScan(mockResult, analysis);
      updateHistory();

      scanBtn.disabled = false;
      scanBtn.textContent = 'Scan WiFi Environment';
    }

    // Event listeners
    scanBtn.addEventListener('click', runNewScan);
    clearBtn.addEventListener('click', () => {
      clearHistory();
      updateHistory();
      mainResult.innerHTML = '';
    });

    // Initial load
    updateHistory();
    mainResult.innerHTML = '<div style="color:#666; padding:12px 0;">Click the button above to run your first scan.</div>';
  </script>
</body>
</html>
